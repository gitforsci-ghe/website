project:
  type: website
  output-dir: docs
  render:
    # Render site content only; keep project docs (TEMPLATING.md,
    # SETUP-CHECKLIST.md) out of the rendered site.
    - "*.qmd"
    - "**/*.qmd"

website:
  page-navigation: true
  title: "Git for Scientists (Summer 2026)"
  description: "A strategic foundation workshop for the Global Health
      Engineering group. As research teams begin to work alongside AI
      agents, a shared and confident command of Git and GitHub becomes the
      basis for safe and effective collaboration. This course gets
      researchers ready for that shift, teaching the core Git and GitHub
      workflows (clone, commit, push, pull, branches, pull requests, and
      issues) that let a team collaborate clearly and harness coding
      agents such as Claude Code with confidence."
  site-url: "https://gitforsci-ghe.github.io/website/"

  repo-url: https://github.com/gitforsci-ghe/website
  repo-actions: [edit, issue]

  page-footer:
    right: "This page is built with [Quarto](https://quarto.org/)."
    background: "#F5F5F5"

  sidebar:
    background: "#F5F5F5"
    logo: "images/ghe-square-logo.png"
    pinned: true
    align: center
    tools:
      - icon: github
        href: https://github.com/gitforsci-ghe/website
        text: "GitHub organization"
    style: "docked"
    search: false
    collapse-level: 1
    contents:
      - text: "---"
      - section: "Pre-course work"
        href: index.qmd
        contents:
          - href: pre-work/01-install-r.qmd
            text: "Step 1: Install R & RStudio"
          - href: pre-work/02-github-acc.qmd
            text: "Step 2: GitHub account"
          - href: pre-work/03-survey.qmd
            text: "Step 3: Pre-course survey"
          - href: pre-work/04-github-pat.qmd
            text: "Step 4: GitHub PAT"
          - href: pre-work/05-install-git.qmd
            text: "Step 5: Install Git"
          - href: pre-work/06a-clone-repo.qmd
            text: "Step 6a: Test setup - clone repository"
          - href: pre-work/06b-configure-git.qmd
            text: "Step 6b: Test setup - configure Git"
          - href: pre-work/06c-install-verify.qmd
            text: "Step 6c: Test setup - install & report"
          - href: pre-work/07-big-picture.qmd
            text: "Step 7: Why Git? Why GitHub?"
      - section: "Workshop"
        contents:
          - href: workshop/index.qmd
            text: "Git for Scientists"
      - section: "Reference"
        contents:
          - href: platform-guide.qmd
            text: "Which tool does what?"
          - href: glossary.qmd
            text: "Glossary"
          - href: glossary-expanded.qmd
            text: "Glossary (self-contained)"
          - href: glossary-plain.qmd
            text: "Glossary (plain language)"

format:
  html:
    theme:
      light: [litera, theme.scss]
    grid:
      sidebar-width: 300px
      body-width: 900px
      margin-width: 250px
    link-external-icon: true
    link-external-newwindow: true
    code-copy: true
    code-overflow: wrap
    toc: true
    mainfont: "Atkinson Hyperlegible"
    include-in-header:
        - text: |
            <!-- Privacy-friendly analytics by Plausible -->
            <script async src="https://plausible.io/js/pa-gVsy6lbxSIOlvO94rL3Kr.js"></script>
            <script>
              window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
              plausible.init()
            </script>

freeze: auto
editor: source